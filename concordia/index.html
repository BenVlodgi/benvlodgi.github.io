<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concordia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1e1e2e;
    color: #cdd6f4;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }
  .container {
    max-width: 600px;
    text-align: center;
  }
  h1 {
    font-size: 36px;
    color: #89b4fa;
    margin-bottom: 12px;
  }
  .tagline {
    font-size: 16px;
    color: #a6adc8;
    margin-bottom: 32px;
  }
  .desc {
    font-size: 14px;
    color: #6c7086;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .links {
    display: flex;
    justify-content: center;
    gap: 16px;
  }
  .links a {
    color: #89b4fa;
    text-decoration: none;
    padding: 8px 20px;
    border: 1px solid #89b4fa;
    border-radius: 8px;
    font-size: 14px;
    transition: background .2s;
  }
  .links a:hover {
    background: #1e3a5f;
  }
</style>
</head>
<body>
<div class="container">
  <h1>Concordia</h1>
  <p class="tagline">Multi-project orchestrator for Claude Code</p>
  <p class="desc">
    Monitor GitHub issues across all your projects from one dashboard.
    Dispatch Claude Code subagents to fix issues automatically.
    Track progress in real-time.
  </p>
  <div class="links">
    <a href="https://github.com/BenVlodgi/Concordia">GitHub</a>
  </div>
</div>
</body>
</html>
